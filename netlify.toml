[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Serve the SPA for all routes (handles client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Netlify functions prefix
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
