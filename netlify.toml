[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

# Serve the SPA for all routes (handles client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
