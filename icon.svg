
/* GlobalStyles.css - High Contrast Design System */

:root {
  --bg-navy: #020617;
  --accent-blue: #60A5FA;
  --text-white: #FFFFFF;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background-color: var(--bg-navy) !important;
  color: var(--text-white) !important;
  font-family: 'Inter', sans-serif !important;
  font-weight: 900 !important; /* font-extrabold */
  font-size: 16px !important; /* Base size reduced for mobile */
  margin: 0;
  padding: 0;
  overflow: hidden;
  line-height: 1.4;
}

@media (min-width: 768px) {
  body {
    font-size: 20px !important;
  }
}

h1, h2, h3, h4 {
  font-weight: 900 !important;
  text-transform: uppercase !important;
  letter-spacing: -0.05em !important;
  margin: 0;
}

h1 { font-size: 32px !important; }
h2 { font-size: 24px !important; }
h3 { font-size: 20px !important; }

@media (min-width: 768px) {
  h1 { font-size: 48px !important; }
  h2 { font-size: 32px !important; }
  h3 { font-size: 28px !important; }
}

/* Interactive Elements */
button {
  min-height: 56px !important; /* Reduced for mobile */
  font-weight: 900 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.1em !important;
  border-radius: 16px !important;
  transition: all 0.2s ease !important;
}

@media (min-width: 768px) {
  button {
    min-height: 72px !important;
  }
}

button:active {
  transform: scale(0.95) !important;
}

/* Cards */
.card-brutal {
  border: 3px solid var(--accent-blue) !important;
  border-radius: 24px !important;
  padding: 24px !important;
  background-color: transparent !important;
}

/* Navigation */
.nav-bar {
  background-color: var(--bg-navy) !important;
  border-top: 3px solid var(--accent-blue) !important;
  height: 100px !important;
}

/* Inputs */
input, textarea {
  background-color: transparent !important;
  border: 3px solid var(--accent-blue) !important;
  color: var(--text-white) !important;
  padding: 20px !important;
  font-size: 20px !important;
  font-weight: 900 !important;
  border-radius: 16px !important;
  width: 100% !important;
}

input:focus {
  outline: none !important;
  box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.5) !important;
}

/* RTL Support */
[dir="rtl"] {
  text-align: right !important;
}

/* Scrollbar */
.scrollbar-hide::-webkit-scrollbar {
  display: none;
}
.scrollbar-hide {
  -ms-overflow-style: none;
  scrollbar-width: none;
}
